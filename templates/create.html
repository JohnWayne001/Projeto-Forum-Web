<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/css/style.css">
    <title>Novo Post</title>
</head>
<body>
    <h1>Criar Post</h1>
    <form method="post">
        <input type="text" name="titulo" placeholder="Título" required><br>
        <input type="text" name="resumo" placeholder="Resumo" required><br>
        <textarea name="conteudo" placeholder="Conteúdo completo" required></textarea><br>
        <input type="text" name="autor" placeholder="Nome do Autor" required><br>
        <button type="submit">Salvar Post</button>
    </form>
    <a class="btn-cancelar" href="/">Cancelar</a>
</body>
</html>
